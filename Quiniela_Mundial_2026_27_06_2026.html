<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela Mundial 2026 — Centro de Control</title>
<style>
  :root{
    --bg:#0A1F1C; --surface:#0F2A25; --surface2:#16352E; --surface3:#1D423A;
    --line:#244A41; --amber:#F2B33D; --amber-dim:#A87A2A; --bone:#E8E4D9; --bone-dim:#9CAFA8;
    --green:#5BA88F; --red:#D4708A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--bone); font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    min-height:100vh;
  }
  .qm-num{font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-weight:700; letter-spacing:0.02em;}

  /* ---------- App load veil ---------- */
  #qm-veil{
    position:fixed; inset:0; background:var(--bg); display:flex; align-items:center;
    justify-content:center; z-index:200; transition:opacity .35s ease;
  }
  #qm-veil .qm-veil-brand{font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; color:var(--amber); font-size:20px; letter-spacing:0.06em;}
  #qm-veil.hide{opacity:0; pointer-events:none;}

  .qm-app{
    display:flex; min-height:100vh; max-width:1280px; margin:0 auto;
    box-shadow:0 0 0 1px var(--line);
  }
  .qm-sidebar{width:252px; background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; flex-shrink:0; height:100vh; position:sticky; top:0;}
  .qm-brand{padding:22px 20px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;}
  .qm-brand-icon{width:34px; height:34px; border-radius:8px; background:var(--amber); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .qm-brand-icon i{color:#1A1305; font-size:18px;}
  .qm-brand-title{font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-size:16px; font-weight:600; color:var(--amber); letter-spacing:0.03em; line-height:1.2;}
  .qm-brand-sub{font-size:10.5px; color:var(--bone-dim); margin-top:1px; letter-spacing:0.04em; text-transform:uppercase;}
  .qm-navscroll{flex:1; overflow-y:auto;}
  .qm-navgroup{padding:14px 12px 4px;}
  .qm-navlabel{font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--bone-dim); padding:0 10px 6px;}
  .qm-navitem{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--bone-dim); transition:background .12s; margin-bottom:2px; user-select:none;}
  .qm-navitem:hover{background:var(--surface2); color:var(--bone);}
  .qm-navitem.active{background:var(--surface3); color:var(--amber); font-weight:500;}
  .qm-navitem .qm-dot{width:6px; height:6px; border-radius:50%; background:var(--bone-dim); flex-shrink:0;}
  .qm-navitem.complete .qm-dot{background:var(--green);}
  .qm-navitem.active .qm-dot{background:var(--amber);}
  .qm-sidefoot{padding:14px 20px 18px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:10px;}
  .qm-sidefoot-link{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--bone-dim); cursor:pointer; user-select:none;}
  .qm-sidefoot-link:hover{color:var(--bone);}
  .qm-sidefoot-link i{font-size:15px;}

  .qm-main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .qm-topbar{height:58px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; padding:0 26px; flex-shrink:0; position:sticky; top:0; background:var(--bg); z-index:10;}
  .qm-topbar-title{font-size:15px; font-weight:500;}
  .qm-topbar-sub{font-size:12px; color:var(--bone-dim); margin-top:1px;}
  .qm-content{flex:1; padding:26px 28px 60px;}

  .qm-btn{background:var(--surface3); border:1px solid var(--line); color:var(--bone); font-size:12px; padding:8px 14px; border-radius:8px; cursor:pointer; font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; display:inline-flex; align-items:center; gap:6px; transition:border-color .12s;}
  .qm-btn:hover{border-color:var(--amber-dim);}
  .qm-btn.primary{background:var(--amber); color:#1A1305; border-color:var(--amber); font-weight:500;}
  .qm-btn.primary:hover{filter:brightness(1.06);}
  .qm-btn.ghost{background:transparent;}

  .qm-grid-metrics{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px;}
  .qm-metric{background:var(--surface2); border-radius:10px; padding:15px 17px; border:1px solid var(--line);}
  .qm-metric-label{font-size:11px; color:var(--bone-dim); text-transform:uppercase; letter-spacing:0.05em;}
  .qm-metric-value{font-size:27px; margin-top:5px;}

  .qm-section-title{font-size:13px; font-weight:500; color:var(--bone-dim); text-transform:uppercase; letter-spacing:0.04em; margin:0 0 12px;}

  .qm-table-wrap{overflow-x:auto; margin-bottom:30px; border:1px solid var(--line); border-radius:10px;}
  .qm-table{width:100%; border-collapse:collapse; min-width:760px;}
  .qm-table th{text-align:left; font-size:11px; color:var(--bone-dim); text-transform:uppercase; letter-spacing:0.04em; padding:10px 12px; border-bottom:1px solid var(--line); font-weight:500; background:var(--surface2); position:sticky; top:0;}
  .qm-table td{padding:11px 12px; border-bottom:1px solid var(--surface2); font-size:13px; vertical-align:middle;}
  .qm-table tr:last-child td{border-bottom:none;}
  .qm-rank-pill{width:25px; height:25px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; background:var(--surface3);}
  .qm-rank-pill.gold{background:var(--amber); color:#1A1305;}
  .qm-player-name{font-weight:500;}
  .qm-swatch{width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; margin-right:8px;}

  .qm-phase-banner{display:flex; align-items:center; gap:13px; padding:15px 19px; border-radius:10px; margin-bottom:20px; border:1px solid var(--line);}
  .qm-phase-banner.pending{background:var(--surface2);}
  .qm-phase-banner.done{background:rgba(242,179,61,0.1); border-color:var(--amber-dim);}

  .qm-grid-phasecards{display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:10px;}

  .qm-scoreboard{background:var(--surface2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; overflow:hidden;}
  .qm-match-row{display:grid; grid-template-columns:46px 1fr 84px 1fr 110px 18px; align-items:center; padding:12px 16px; gap:10px; cursor:pointer;}
  .qm-match-grp{font-size:10px; color:var(--bone-dim); text-transform:uppercase;}
  .qm-team{font-size:13.5px; font-weight:500; text-align:right;}
  .qm-team.left{text-align:left;}
  .qm-team-editable{cursor:pointer; display:flex; align-items:center; gap:0;}
  .qm-team.left.qm-team-editable{justify-content:flex-start;}
  .qm-team:not(.left).qm-team-editable{justify-content:flex-end;}
  .qm-team-editable:hover{color:var(--amber);}
  .qm-team-overridden{color:var(--green);}
  .qm-team-edit{display:flex; align-items:center;}
  .qm-team-edit-input{width:100%; background:var(--bg); border:1px solid var(--amber); border-radius:6px; padding:4px 8px; color:var(--bone); font-size:13px; font-family:inherit;}
  .qm-team-edit-input:focus{outline:none;}

  /* ===== CONTADOR REGRESIVO ===== */
  .qm-countdown{display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--bone-dim); background:rgba(255,255,255,0.05); border-radius:6px; padding:3px 8px; margin-left:8px;}
  .qm-countdown.urgent{color:#FF6B6B; font-weight:600; animation:pulse-red 1.5s infinite;}
  .qm-countdown.soon{color:var(--amber); font-weight:600;}
  .qm-countdown.started{color:#5BA88F; font-weight:500;}
  @keyframes pulse-red{0%,100%{opacity:1;}50%{opacity:0.5;}}

  /* ===== PANEL RAPIDO ADMIN ===== */
  .qm-quickpanel{background:var(--surface2); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:18px;}
  .qm-quickpanel-title{font-size:14px; font-weight:600; color:var(--amber); margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .qm-quickrow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .qm-quickrow:last-child{border-bottom:none;}
  .qm-quickrow-teams{flex:1; font-weight:500;}
  .qm-quickrow-score{display:flex; align-items:center; gap:6px;}
  .qm-quickinput{width:38px; height:34px; text-align:center; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--amber); font-size:15px; font-weight:700; font-family:inherit;}
  .qm-quickinput:focus{border-color:var(--amber); outline:none;}

  /* ===== CHAT ===== */
  .qm-chat-wrap{display:flex; flex-direction:column; height:420px;}
  .qm-chat-messages{flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:10px;}
  .qm-chat-msg{display:flex; gap:9px; align-items:flex-start;}
  .qm-chat-msg.mine{flex-direction:row-reverse;}
  .qm-chat-avatar{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; overflow:hidden;}
  .qm-chat-avatar img{width:100%; height:100%; object-fit:cover;}
  .qm-chat-bubble{max-width:72%; background:var(--surface2); border-radius:12px; padding:9px 12px; font-size:12.5px; line-height:1.4; position:relative;}
  .qm-chat-msg.mine .qm-chat-bubble{background:rgba(91,168,143,0.2); border:1px solid rgba(91,168,143,0.3);}
  .qm-chat-name{font-size:10px; color:var(--bone-dim); margin-bottom:3px; font-weight:600;}
  .qm-chat-time{font-size:10px; color:var(--bone-dim); margin-top:3px; text-align:right;}
  .qm-chat-reactions{display:flex; gap:4px; flex-wrap:wrap; margin-top:5px;}
  .qm-chat-reaction{background:rgba(255,255,255,0.07); border-radius:10px; padding:2px 7px; font-size:12px; cursor:pointer; border:1px solid transparent; transition:all 0.15s;}
  .qm-chat-reaction:hover,.qm-chat-reaction.mine-r{background:rgba(242,179,61,0.15); border-color:var(--amber);}
  .qm-chat-input-row{display:flex; gap:8px; padding:10px; border-top:1px solid var(--line);}
  .qm-chat-input{flex:1; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:9px 12px; color:var(--bone); font-size:13px; font-family:inherit; resize:none; height:40px;}
  .qm-chat-input:focus{outline:none; border-color:var(--amber);}
  .qm-emoji-bar{display:flex; gap:6px; padding:6px 10px; flex-wrap:wrap; border-bottom:1px solid var(--line);}
  .qm-emoji-btn{font-size:18px; cursor:pointer; background:none; border:none; padding:2px 4px; border-radius:6px; transition:transform 0.1s;}
  .qm-emoji-btn:hover{transform:scale(1.3);}

  /* ===== PERFIL CON FOTO ===== */
  .qm-avatar{width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid var(--line); flex-shrink:0;}
  .qm-avatar-placeholder{width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; border:2px solid var(--line);}
  .qm-profile-upload{display:none;}
  .qm-profile-upload-btn{cursor:pointer; display:flex; align-items:center; gap:6px; font-size:12px; color:var(--bone-dim); padding:6px 10px; background:var(--surface2); border-radius:8px; border:1px dashed var(--line);}
  .qm-profile-upload-btn:hover{border-color:var(--amber); color:var(--amber);}

  /* ===== INSIGNIAS ===== */
  .qm-badge{display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:10px; font-size:11px; font-weight:600;}
  .qm-badge-gold{background:rgba(242,179,61,0.2); color:var(--amber); border:1px solid rgba(242,179,61,0.4);}
  .qm-badge-silver{background:rgba(180,180,200,0.15); color:#B0B0C8; border:1px solid rgba(180,180,200,0.3);}
  .qm-badge-bronze{background:rgba(180,100,50,0.15); color:#C87840; border:1px solid rgba(180,100,50,0.3);}
  .qm-badge-fire{background:rgba(255,80,50,0.15); color:#FF6040; border:1px solid rgba(255,80,50,0.3);}
  .qm-badge-exact{background:rgba(91,168,143,0.15); color:#5BA88F; border:1px solid rgba(91,168,143,0.3);}
  .qm-badges-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;}
  .qm-streak-pill{display:inline-flex; align-items:center; gap:4px; background:rgba(255,100,50,0.15); border:1px solid rgba(255,100,50,0.3); color:#FF6B3D; border-radius:10px; padding:2px 8px; font-size:11px; font-weight:700;}

  /* ===== GRAFICA EVOLUCION ===== */
  .qm-chart-wrap{width:100%; overflow-x:auto; padding-bottom:8px;}
  .qm-chart-svg{min-width:320px; width:100%;}

  /* ===== ANIMACIONES PUNTOS ===== */
  @keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-60px) scale(1.4);}}
  .qm-points-pop{position:fixed; pointer-events:none; z-index:9999; font-size:22px; font-weight:800; color:var(--amber); animation:float-up 1.4s ease-out forwards;}
  @keyframes rank-change{0%{background:rgba(242,179,61,0.3);}100%{background:transparent;}}
  .qm-rank-changed{animation:rank-change 1.5s ease-out;}
  @keyframes celebrate{0%,100%{transform:rotate(0deg);}25%{transform:rotate(-8deg);}75%{transform:rotate(8deg);}}
  .qm-celebrate{animation:celebrate 0.5s ease-in-out 3;}

  /* ===== NOTIFICACION CIERRE ===== */
  .qm-closing-banner{display:flex; align-items:center; gap:10px; padding:11px 16px; border-radius:10px; background:rgba(242,179,61,0.12); border:1px solid var(--amber); margin-bottom:14px; font-size:12.5px; color:var(--bone);}

  /* ===== HISTORIAL ===== */
  .qm-history-row{display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; background:var(--surface2); margin-bottom:6px; font-size:12.5px;}
  .qm-history-score{font-family:'Arial Narrow',sans-serif; font-size:15px; font-weight:700; color:var(--amber); min-width:40px; text-align:center;}
  .qm-history-pred{color:var(--bone-dim); font-size:12px;}

  /* ===== EXPORT PDF ===== */
  .qm-export-btn{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--bone-dim); cursor:pointer; user-select:none;}
  .qm-export-btn:hover{color:var(--amber);}

  .qm-score-box{display:flex; align-items:center; justify-content:center; gap:6px;}
  .qm-realinput{width:34px; height:34px; text-align:center; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--amber); font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-size:16px; font-weight:600;}
  .qm-realinput:disabled, .qm-predinput:disabled{opacity:0.45; cursor:not-allowed; background:var(--surface);}
  .qm-realinput:focus{outline:none; border-color:var(--amber);}
  .qm-realinput::-webkit-outer-spin-button,.qm-realinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .qm-dash{color:var(--bone-dim); font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-size:15px;}
  .qm-fecha{font-size:11px; color:var(--bone-dim); text-align:right;}
  .qm-chevron{font-size:14px; color:var(--bone-dim); transition:transform .15s;}
  .qm-chevron.open{transform:rotate(180deg);}

  .qm-predpanel{padding:0 16px 16px;}
  .qm-predcard{background:var(--surface); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .qm-predrow{display:grid; grid-template-columns:1fr auto; align-items:center; padding:10px 16px; border-bottom:1px solid var(--surface2); gap:10px;}
  .qm-predrow:last-child{border-bottom:none;}
  .qm-predrow-player{display:flex; align-items:center; font-size:12.5px; font-weight:500;}
  .qm-predrow-inputs{display:flex; align-items:center; justify-content:flex-end; gap:8px;}
  .qm-predinput{width:38px; height:32px; text-align:center; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--bone); font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-size:14px;}
  .qm-predinput:focus{outline:none; border-color:var(--green);}
  .qm-predinput::-webkit-outer-spin-button,.qm-predinput::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .qm-pts-pill{font-size:11px; padding:3px 9px; border-radius:10px; font-weight:600; min-width:38px; text-align:center;}
  .qm-pts-pill.p3{background:rgba(91,168,143,0.2); color:var(--green);}
  .qm-pts-pill.p1{background:rgba(242,179,61,0.18); color:var(--amber);}
  .qm-pts-pill.p0{background:rgba(212,112,138,0.15); color:var(--red);}
  .qm-pts-pill.pnone{background:var(--surface2); color:var(--bone-dim);}

  .qm-money-cell{font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-weight:600; font-size:13px;}
  .qm-money-cell.pos{color:var(--green);}
  .qm-money-cell.neg{color:var(--red);}
  .qm-money-cell.zero{color:var(--bone-dim);}

  .qm-bet-control{display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--line); border-radius:8px; padding:7px 11px; margin-top:6px;}
  .qm-bet-control span.qm-cop{font-size:13px; color:var(--bone-dim);}
  .qm-bet-control input{background:transparent; border:none; color:var(--amber); font-family:'Arial Narrow','Segoe UI Semibold',-apple-system,sans-serif; font-size:15px; width:90px; text-align:right;}
  .qm-bet-control input:focus{outline:none;}

  .qm-modal-overlay{position:fixed; inset:0; background:rgba(5,12,10,0.72); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .qm-modal{background:var(--surface2); border:1px solid var(--line); border-radius:14px; padding:26px; width:400px; max-width:100%;}
  .qm-modal h3{font-size:15px; font-weight:500; margin:0 0 6px;}
  .qm-modal p.qm-modal-hint{font-size:12px; color:var(--bone-dim); margin:0 0 16px;}
  .qm-modal-input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:10px 13px; color:var(--bone); font-size:13px; margin-bottom:9px; font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;}
  .qm-modal-input:focus{outline:none; border-color:var(--amber);}
  .qm-modal-row{display:flex; align-items:center; gap:10px; margin-bottom:9px;}
  .qm-modal-swatch{width:10px; height:10px; border-radius:50%; flex-shrink:0;}

  .qm-toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--surface3); border:1px solid var(--amber-dim); color:var(--amber); padding:10px 20px; border-radius:20px; font-size:12.5px; z-index:100; box-shadow:0 6px 24px rgba(0,0,0,0.3); opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;}
  .qm-toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .qm-empty{text-align:center; padding:50px 20px; color:var(--bone-dim);}
  .qm-empty i{font-size:32px; opacity:.5; margin-bottom:10px; display:block;}

  /* mobile sidebar */
  .qm-mobilebar{display:none;}
  @media (max-width:860px){
    .qm-app{flex-direction:column;}
    .qm-sidebar{display:none;}
    .qm-mobilebar{display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;}
    .qm-mobilebar select{flex:1; background:var(--surface2); border:1px solid var(--line); color:var(--bone); font-size:13px; padding:8px 10px; border-radius:8px; font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;}
    .qm-mobilebar select:focus{outline:none; border-color:var(--amber-dim);}
    .qm-match-row{grid-template-columns:32px 1fr 70px 1fr 14px; gap:6px; padding:11px 12px;}
    .qm-fecha{display:none;}
    .qm-team{font-size:12.5px;}
    .qm-table{min-width:680px;}
  }
</style>
</head>
<body>

<div id="qm-veil"><div class="qm-veil-brand">QUINIELA 2026</div></div>
<div id="qm-root"></div>

<script>

try {

/* =====================================================================
   PERSISTENCIA: Firebase Realtime Database. names/preds/reals/bet viven
   en un servidor compartido y se sincronizan en vivo entre los 6
   navegadores que tengan el archivo abierto, en cualquier ciudad. La
   pantalla actual (`view`) es la única cosa que se queda local a cada
   navegador, para que cada jugador pueda navegar sin mover la pantalla
   de los demás.
===================================================================== */
function useFirebaseAuth(){
  const [user, setUser] = React.useState(undefined); // undefined = aún no se sabe, null = sin sesión
  const [loginError, setLoginError] = React.useState(null);
  const [loggingIn, setLoggingIn] = React.useState(false);
  const [signupError, setSignupError] = React.useState(null);
  const [signingUp, setSigningUp] = React.useState(false);

  React.useEffect(()=>{
    let unsub = null;
    let cancelled = false;
    const attach = ()=>{
      if(cancelled) return;
      unsub = window.__fb_onAuthChanged((u)=>setUser(u || null));
    };
    if(window.__fb_ready) attach();
    else window.addEventListener('qm-firebase-ready', attach, {once:true});
    return ()=>{
      cancelled = true;
      if(unsub) unsub();
    };
  },[]);

  const login = React.useCallback(async (email, password)=>{
    setLoggingIn(true);
    setLoginError(null);
    const result = await window.__fb_signIn(email.trim(), password);
    setLoggingIn(false);
    if(!result.ok){
      const friendly = {
        'auth/invalid-email': 'El correo no tiene un formato válido.',
        'auth/user-not-found': 'No existe una cuenta con ese correo.',
        'auth/wrong-password': 'La contraseña es incorrecta.',
        'auth/invalid-credential': 'Correo o contraseña incorrectos.',
        'auth/too-many-requests': 'Demasiados intentos. Espera un momento y vuelve a intentar.',
      }[result.code] || 'No se pudo iniciar sesión. Intenta de nuevo.';
      setLoginError(friendly);
      return false;
    }
    return true;
  },[]);

  const signup = React.useCallback(async (email, password)=>{
    setSigningUp(true);
    setSignupError(null);
    const result = await window.__fb_signUp(email.trim(), password);
    setSigningUp(false);
    if(!result.ok){
      const friendly = {
        'auth/invalid-email': 'El correo no tiene un formato válido.',
        'auth/email-already-in-use': 'Ya existe una cuenta con ese correo. Intenta iniciar sesión en vez de crear una nueva.',
        'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
        'auth/operation-not-allowed': 'El registro por correo no está habilitado. Avisa al administrador.',
      }[result.code] || 'No se pudo crear la cuenta. Intenta de nuevo.';
      setSignupError(friendly);
      return false;
    }
    return true;
  },[]);

  const logout = React.useCallback(()=>{
    window.__fb_signOut();
  },[]);

  return { user, login, logout, loginError, loggingIn, signup, signupError, signingUp };
}

function useFirebaseState(path, initial){
  const [val, setValRaw] = React.useState(initial);
  const [loaded, setLoaded] = React.useState(false);
  const localVersionRef = React.useRef(0);
  const lastWrittenRef = React.useRef(undefined);

  React.useEffect(()=>{
    let unsub = null;
    let cancelled = false;

    const attach = ()=>{
      if(cancelled) return;
      unsub = window.__fb_onValue(path, (remoteVal)=>{
        const value = remoteVal===null||remoteVal===undefined ? initial : remoteVal;
        lastWrittenRef.current = JSON.stringify(value);
        setValRaw(value);
        setLoaded(true);
      });
    };

    if(window.__fb_ready){
      attach();
    } else {
      const onReady = ()=>attach();
      window.addEventListener('qm-firebase-ready', onReady, {once:true});
      return ()=>{
        cancelled = true;
        window.removeEventListener('qm-firebase-ready', onReady);
      };
    }

    return ()=>{ cancelled = true; if(unsub) unsub(); };
  // eslint-disable-next-line
  },[path]);

  const setVal = React.useCallback((updater)=>{
    setValRaw(prev=>{
      const next = typeof updater==='function' ? updater(prev) : updater;
      const serialized = JSON.stringify(next);
      if(serialized !== lastWrittenRef.current){
        lastWrittenRef.current = serialized;
        const myVersion = ++localVersionRef.current;
        window.__fb_set(path, next).catch(()=>{});
      }
      return next;
    });
  },[path]);

  return [val, setVal, loaded];
}

/* Calcula el tiempo restante hasta un timestamp ISO y devuelve
   un objeto {dias, horas, minutos, segundos, estado, texto} */
function calcCountdown(tsISO){
  const now = Date.now();
  const target = new Date(tsISO).getTime();
  const diff = target - now;
  if(diff <= 0) return {estado:'started', texto:'En curso ⚽'};
  const dias  = Math.floor(diff / 86400000);
  const horas = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const segs  = Math.floor((diff % 60000) / 1000);
  let texto, estado;
  if(diff < 3600000){          // < 1 hora
    texto = `${mins}m ${segs}s`;
    estado = 'urgent';
  } else if(diff < 86400000){  // < 1 día
    texto = `${horas}h ${mins}m`;
    estado = 'soon';
  } else {
    texto = dias===1 ? `1 día ${horas}h` : `${dias}d ${horas}h`;
    estado = 'normal';
  }
  return {dias, horas, minutos:mins, segundos:segs, estado, texto};
}

}

/* Calcula racha actual y máxima de aciertos de UN jugador en TODA la quiniela */
function calcStreaks(playerIdx, preds, reals){
  const results = [];
  Object.entries(MATCHES).forEach(([phId, matches])=>{
    matches.forEach((_, idx)=>{
      const k = phId+'_'+idx;
      const real = reals[k];
      const pred = (preds[k]||{})[playerIdx];
      if(real && pred && real.l!==undefined && real.v!==undefined &&
         pred.l!==undefined && pred.v!==undefined){
        results.push(calcPoints(pred, real));
      }
    });
  });
  let cur=0, max=0, exactas=0;
  results.forEach(pts=>{
    if(pts > 0){ cur++; max=Math.max(max,cur); if(pts===3) exactas++; }
    else cur=0;
  });
  return {current:cur, max, exactas, total:results.length};
}

function calcPoints(pred, real){
  if(!pred || pred.l===""||pred.l===undefined||pred.v===""||pred.v===undefined) return null;
  if(!real || real.l===""||real.l===undefined||real.v===""||real.v===undefined) return null;
  const pl=Number(pred.l), pv=Number(pred.v), rl=Number(real.l), rv=Number(real.v);
  if(pl===rl && pv===rv) return 3;
  const predSign = Math.sign(pl-pv), realSign = Math.sign(rl-rv);
  if(predSign===realSign) return 1;
  return 0;
}

/* =====================================================================
   CASCADA DE EQUIPOS EN ELIMINATORIAS
   Mapa explícito de qué casilla de qué fase alimenta a cuál, validado a
   mano contra los placeholders "Gan. R32 #N" / "Perd. Semi #N" ya
   escritos en MATCHES. Los índices son 0-based; el texto "#1" en
   MATCHES corresponde al índice 0, "#2" al índice 1, etc.
===================================================================== */
function buildKnockoutDeps(){
  const deps = {}; // "Oct_0_local" -> {phase:"R32", idx:0, which:"winner"}
  const link = (targetPhase, targetIdx, targetField, sourcePhase, sourceIdx, which)=>{
    deps[targetPhase+"_"+targetIdx+"_"+targetField] = {phase:sourcePhase, idx:sourceIdx, which};
  };
  for(let i=0;i<8;i++){
    link("Oct", i, "local", "R32", 2*i, "winner");
    link("Oct", i, "visit", "R32", 2*i+1, "winner");
  }
  for(let i=0;i<4;i++){
    link("CF", i, "local", "Oct", 2*i, "winner");
    link("CF", i, "visit", "Oct", 2*i+1, "winner");
  }
  for(let i=0;i<2;i++){
    link("SF", i, "local", "CF", 2*i, "winner");
    link("SF", i, "visit", "CF", 2*i+1, "winner");
  }
  link("FINAL", 0, "local", "SF", 0, "loser");
  link("FINAL", 0, "visit", "SF", 1, "loser");
  link("FINAL", 1, "local", "SF", 0, "winner");
  link("FINAL", 1, "visit", "SF", 1, "winner");
  return deps;
}
const KNOCKOUT_DEPS = buildKnockoutDeps();

/* Decide quién avanza (winner) y quién queda eliminado (loser) de un
   partido de eliminatorias, dado el marcador real y, si hubo empate,
   el resultado de penales guardado aparte. Devuelve {winner:'local'|'visit'|null, ...}
   — null cuando todavía no hay suficiente información para decidir. */
function getMatchOutcome(real, penalty){
  if(!real || real.l===""||real.l===undefined||real.v===""||real.v===undefined) return {winnerSide:null};
  const rl = Number(real.l), rv = Number(real.v);
  if(rl > rv) return {winnerSide:'local'};
  if(rv > rl) return {winnerSide:'visit'};
  // Empate: solo se puede decidir si el administrador ya marcó el penal
  if(penalty === 'local' || penalty === 'visit') return {winnerSide:penalty};
  return {winnerSide:null, needsPenalty:true};
}

function fmtCOP(n){
  const neg = n<0;
  const v = Math.round(Math.abs(n));
  return (neg?'-':'')+'$'+v.toLocaleString('es-CO');
}

      const k = key(phaseId, idx);
      const real = reals[k];
      const pen = penalties[k];

function LoginScreen({login, loginError, loggingIn, signup, signupError, signingUp}){
  const [mode, setMode] = React.useState("login"); // "login" | "signup"
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [password2, setPassword2] = React.useState("");
  const [localError, setLocalError] = React.useState(null);

  const isSignup = mode==="signup";
  const error = localError || (isSignup ? signupError : loginError);
  const busy = isSignup ? signingUp : loggingIn;

  const switchMode = (m)=>{
    setMode(m);
    setLocalError(null);
    setPassword("");
    setPassword2("");
  };

  const submit = (e)=>{
    e.preventDefault();
    setLocalError(null);
    if(!email || !password) return;
    if(isSignup){
      if(password.length < 6){
        setLocalError("La contraseña debe tener al menos 6 caracteres.");
        return;
      }
      if(password !== password2){
        setLocalError("Las dos contraseñas no coinciden.");
        return;
      }
      signup(email, password);
    } else {
      login(email, password);
    }
  };

  return React.createElement('div',{style:{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:'100vh', padding:'20px'}},
    React.createElement('div',{style:{width:340, maxWidth:'100%'}},

        React.createElement('div',{style:{width:36, height:36, borderRadius:8, background:'var(--amber)', display:'flex', alignItems:'center', justifyContent:'center'}},

        ),

          React.createElement('div',{style:{fontSize:10.5, color:'var(--bone-dim)', textTransform:'uppercase', letterSpacing:'0.04em'}}, 'Centro de control')
        )
      ),
      React.createElement('form',{onSubmit:submit, style:{background:'var(--surface2)', border:'1px solid var(--line)', borderRadius:14, padding:24}},

        }),

function ChatPanel({chat, setChat, names, myPlayerIndex, avatars, setAvatars, myUid}){
  const [text, setText] = React.useState('');
  const [showEmoji, setShowEmoji] = React.useState(false);
  const messagesEndRef = React.useRef(null);
  const fileInputRef = React.useRef(null);

  React.useEffect(()=>{
    if(messagesEndRef.current) messagesEndRef.current.scrollIntoView({behavior:'smooth'});
  },[chat]);

  const sendMsg = ()=>{
    const t = text.trim();
    if(!t) return;
    const msg = {
      p:myPlayerIndex, txt:t, ts:Date.now(),
      reactions:{}
    };
    const newChat = [...(Array.isArray(chat)?chat:[]), msg];
    setChat(newChat);
    setText('');
    setShowEmoji(false);
  };

  const addReaction = (msgIdx, emoji)=>{
    const newChat = [...(Array.isArray(chat)?chat:[])];
    const msg = {...newChat[msgIdx]};
    const reactions = {...(msg.reactions||{})};
    const key = emoji;
    const users = reactions[key] ? [...reactions[key]] : [];
    const myIdx = users.indexOf(myPlayerIndex);
    if(myIdx>=0) users.splice(myIdx,1);
    else users.push(myPlayerIndex);
    if(users.length===0) delete reactions[key];
    else reactions[key]=users;
    msg.reactions = reactions;
    newChat[msgIdx] = msg;
    setChat(newChat);
  };

  const handlePhoto = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const dataUrl = ev.target.result;
      setAvatars(prev=>({...prev, [myPlayerIndex]: dataUrl}));
    };
    reader.readAsDataURL(file);
  };

  const msgs = Array.isArray(chat) ? chat : [];

  return React.createElement('div',{style:{background:'var(--surface2)', border:'1px solid var(--line)', borderRadius:14, overflow:'hidden'}},
    React.createElement('div',{style:{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'12px 16px', borderBottom:'1px solid var(--line)'}},

        React.createElement('input',{type:'file', accept:'image/*', style:{display:'none'}, onChange:handlePhoto})
      )
    ),
    React.createElement('div',{className:'qm-chat-messages', style:{height:320}},
      msgs.length===0 && React.createElement('div',{style:{textAlign:'center', color:'var(--bone-dim)', fontSize:12.5, margin:'auto', padding:20}},
        '¡Sé el primero en escribir! 💬'
      ),
      msgs.map((msg, i)=>{
        const isMine = msg.p === myPlayerIndex;
        return React.createElement('div',{key:i},
          React.createElement('div',{className:'qm-chat-msg'+(isMine?' mine':'')},
            React.createElement(AvatarDisplay,{playerIdx:msg.p, avatars, names, size:30}),
            React.createElement('div',null,
              !isMine && React.createElement('div',{className:'qm-chat-name', style:{color:PLAYER_COLORS[msg.p]}}, names[msg.p]||'?'),
              React.createElement('div',{className:'qm-chat-bubble'},
                msg.txt,
                React.createElement('div',{className:'qm-chat-time'},
                  new Date(msg.ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
                )
              ),
              Object.keys(msg.reactions||{}).length > 0 && React.createElement('div',{className:'qm-chat-reactions'},
                Object.entries(msg.reactions||{}).map(([emoji,users])=>
                  React.createElement('span',{
                    key:emoji,
                    className:'qm-chat-reaction'+(users.includes(myPlayerIndex)?' mine-r':''),
                    onClick:()=>addReaction(i, emoji),
                    title: users.map(u=>names[u]||'?').join(', ')
                  }, emoji+' '+users.length)
                )
              )
            )
          ),
          React.createElement('div',{style:{display:'flex', gap:4, paddingLeft:isMine?0:39, paddingRight:isMine?39:0, justifyContent:isMine?'flex-end':'flex-start', marginTop:2}},
            EMOJI_REACTIONS.slice(0,5).map(emoji=>
              React.createElement('span',{key:emoji, style:{cursor:'pointer', fontSize:13, opacity:0.5}, onClick:()=>addReaction(i,emoji)}, emoji)
            )
          )
        );
      }),

    ),
    showEmoji && React.createElement('div',{className:'qm-emoji-bar'},
      QUICK_EMOJIS.map(e=>React.createElement('button',{key:e, className:'qm-emoji-btn', onClick:()=>setText(prev=>prev+e)}, e))
    ),
    React.createElement('div',{className:'qm-chat-input-row'},
      React.createElement('button',{
        style:{background:'none', border:'none', fontSize:20, cursor:'pointer', padding:'0 4px', opacity:0.7},
        onClick:()=>setShowEmoji(v=>!v)
      }, '😊'),
      React.createElement('textarea',{
        className:'qm-chat-input', value:text,
        placeholder:'Escribe algo... 💬',
        onChange:e=>setText(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter' && !e.shiftKey){e.preventDefault(); sendMsg();} }
      }),
      React.createElement('button',{className:'qm-btn primary', style:{padding:'6px 14px'}, onClick:sendMsg, disabled:!text.trim()}, '→')
    )
  );
}

/* ========== GRAFICA DE EVOLUCION ========== */
function EvolutionChart({names, generalTotals, phasePoints, avatars}){
  const W=600, H=220, PAD={t:20,r:20,b:40,l:40};
  const phases = PHASES.filter(p=>phasePoints[p.id]?.complete);
  if(phases.length===0) return React.createElement('div',{style:{textAlign:'center',color:'var(--bone-dim)',fontSize:12.5,padding:20}},
    'La gráfica aparecerá cuando se completen las primeras fases 📊'
  );

  // Acumular puntos por jugador por fase completada
  const accum = names.map(()=>[0]);
  phases.forEach(ph=>{
    names.forEach((_,i)=>{
      const prev = accum[i][accum[i].length-1];
      accum[i].push(prev + ((phasePoints[ph.id]?.pts||[])[i]||0));
    });
  });

  const maxPts = Math.max(...accum.flat(), 1);
  const cols = phases.length+1;
  const xStep = (W-PAD.l-PAD.r)/(cols-1||1);
  const yScale = (H-PAD.t-PAD.b)/maxPts;

  const toX = (col)=>PAD.l + col*xStep;
  const toY = (pts)=>H-PAD.b - pts*yScale;

  return React.createElement('div',{className:'qm-chart-wrap'},
    React.createElement('svg',{className:'qm-chart-svg', viewBox:`0 0 ${W} ${H}`},
      // Ejes
      React.createElement('line',{x1:PAD.l,y1:PAD.t,x2:PAD.l,y2:H-PAD.b,stroke:'var(--line)',strokeWidth:1}),
      React.createElement('line',{x1:PAD.l,y1:H-PAD.b,x2:W-PAD.r,y2:H-PAD.b,stroke:'var(--line)',strokeWidth:1}),
      // Etiquetas eje X
      ['Inicio',...phases.map(p=>p.short)].map((label,i)=>
        React.createElement('text',{key:i,x:toX(i),y:H-PAD.b+14,textAnchor:'middle',fontSize:9,fill:'var(--bone-dim)'},label)
      ),
      // Líneas por jugador
      names.map((_,i)=>{
        const pts = accum[i];
        const path = pts.map((p,j)=>`${j===0?'M':'L'}${toX(j)},${toY(p)}`).join(' ');
        return React.createElement('g',{key:i},
          React.createElement('path',{d:path, fill:'none', stroke:PLAYER_COLORS[i], strokeWidth:2.5, strokeLinejoin:'round'}),
          pts.map((p,j)=>React.createElement('circle',{key:j, cx:toX(j), cy:toY(p), r:4, fill:PLAYER_COLORS[i], stroke:'var(--bg)', strokeWidth:1.5}))
        );
      }),
      // Leyenda
      names.map((_,i)=>React.createElement('g',{key:i, transform:`translate(${PAD.l+4+i*80},${PAD.t-2})`},
        React.createElement('circle',{cx:5,cy:5,r:4,fill:PLAYER_COLORS[i]}),
        React.createElement('text',{x:12,y:9,fontSize:9,fill:'var(--bone-dim)'},names[i]||'?')
      ))
    )
  );
}

function NameModal({names,setNames,onClose,showToast}){
  const [local,setLocal] = React.useState(names);
  const save = ()=>{
    setNames(local);
    onClose();
    showToast("Nombres actualizados en toda la app");
  };
  return React.createElement('div',{className:'qm-modal-overlay', onClick:onClose},
    React.createElement('div',{className:'qm-modal', onClick:e=>e.stopPropagation()},
      React.createElement('h3',null,'Nombres de los jugadores'),
      React.createElement('p',{className:'qm-modal-hint'}, 'Se actualizan automáticamente en todas las fases y en el dashboard.'),
      local.map((n,i)=>React.createElement('div',{key:i, className:'qm-modal-row'},
        React.createElement('span',{className:'qm-modal-swatch', style:{background:PLAYER_COLORS[i]}}),
        React.createElement('input',{
          className:'qm-modal-input', style:{marginBottom:0}, value:n,
          onChange:e=>{const c=[...local]; c[i]=e.target.value; setLocal(c);}
        })
      )),
      React.createElement('div',{style:{display:'flex',gap:8,marginTop:14,justifyContent:'flex-end'}},
        React.createElement('button',{className:'qm-btn', onClick:onClose},'Cancelar'),
        React.createElement('button',{className:'qm-btn primary', onClick:save},'Guardar')
      )
    )
  );
}

function Dashboard({names,generalTotals,phasePoints,money,bet,setBet}){
  const ranked = names.map((n,i)=>({name:n,pts:generalTotals[i],money:money[i],i}))
    .sort((a,b)=>b.pts-a.pts);
  const leader = ranked[0];
  const phasesComplete = PHASES.filter(p=>phasePoints[p.id].complete).length;

  return React.createElement('div',null,
    React.createElement('div',{className:'qm-grid-metrics'},
      React.createElement('div',{className:'qm-metric'},
        React.createElement('div',{className:'qm-metric-label'},'Líder actual'),
        React.createElement('div',{className:'qm-metric-value qm-num'}, leader && leader.pts>0 ? leader.name : '—')
      ),
      React.createElement('div',{className:'qm-metric'},
        React.createElement('div',{className:'qm-metric-label'},'Puntos del líder'),
        React.createElement('div',{className:'qm-metric-value qm-num'}, leader ? leader.pts : 0)
      ),
      React.createElement('div',{className:'qm-metric'},
        React.createElement('div',{className:'qm-metric-label'},'Fases completadas'),
        React.createElement('div',{className:'qm-metric-value qm-num'}, phasesComplete+' / 8')
      ),
      React.createElement('div',{className:'qm-metric'},
        React.createElement('div',{className:'qm-metric-label'},'Apuesta por fase'),
        React.createElement('div',{className:'qm-bet-control'},
          React.createElement('span',{className:'qm-cop'},'$'),
          React.createElement('input',{type:'number', value:bet, onChange:e=>setBet(Number(e.target.value)||0)})
        )
      )
    ),

    React.createElement('div',{className:'qm-section-title'},'Tabla general'),
    React.createElement('div',{className:'qm-table-wrap'},
      React.createElement('table',{className:'qm-table'},
        React.createElement('thead',null,
          React.createElement('tr',null,
            React.createElement('th',null,'#'),
            React.createElement('th',null,'Jugador'),
            ...PHASES.map(p=>React.createElement('th',{key:p.id, style:{textAlign:'center'}}, p.id)),
            React.createElement('th',{style:{textAlign:'center'}},'Total pts'),
            React.createElement('th',{style:{textAlign:'right'}},'Saldo')
          )
        ),
        React.createElement('tbody',null,
          ranked.map((r,rank)=>React.createElement('tr',{key:r.i},
            React.createElement('td',null, React.createElement('span',{className:'qm-rank-pill'+(rank===0 && r.pts>0?' gold':'')}, rank+1)),
            React.createElement('td',null, React.createElement('span',{className:'qm-player-name'},
              React.createElement('span',{className:'qm-swatch',style:{background:PLAYER_COLORS[r.i]}}),
              r.name
            )),
            ...PHASES.map(p=>{
              const info = phasePoints[p.id];
              const pts = info.totals[r.i];
              const isWinner = info.complete && info.winners.includes(r.i);
              return React.createElement('td',{key:p.id, style:{textAlign:'center'}},
                React.createElement('span',{className:'qm-num', style:{color: isWinner?'var(--amber)':'var(--bone-dim)', fontWeight: isWinner?700:400}}, pts)
              );
            }),
            React.createElement('td',{style:{textAlign:'center'}}, React.createElement('span',{className:'qm-num',style:{fontSize:15}}, r.pts)),
            React.createElement('td',{style:{textAlign:'right'}},
              React.createElement('span',{className:'qm-money-cell '+(r.money>0?'pos':r.money<0?'neg':'zero')}, fmtCOP(r.money))
            )
          ))
        )
      )
    ),

    React.createElement('div',{className:'qm-section-title'},'Ganador por fase'),
    React.createElement('div',{className:'qm-grid-phasecards'},
      PHASES.map(p=>{
        const info = phasePoints[p.id];
        const winnerNames = info.complete ? info.winners.map(i=>names[i]).join(' y ') : null;
        return React.createElement('div',{key:p.id, className:'qm-phase-banner '+(info.complete?'done':'pending')},
          React.createElement(Icon,{name: info.complete?'trophy':'clock', size:19, style:{color: info.complete?'var(--amber)':'var(--bone-dim)'}}),
          React.createElement('div',null,
            React.createElement('div',{style:{fontSize:12, color:'var(--bone-dim)'}}, p.label),
            React.createElement('div',{style:{fontSize:13.5, fontWeight:500, color: info.complete?'var(--amber)':'var(--bone-dim)'}},
              info.complete ? winnerNames : 'En curso'
            )
          )
        );
      })
    )
  );
}

const KNOCKOUT_PHASE_IDS = ["R32","Oct","CF","SF","FINAL"];

function TeamNameCell({phaseId, idx, side, resolvedTeams, teamNames, setTeamNames, isAdmin, align}){
  const slotKey = phaseId+'_'+idx+'_'+side;
  const displayName = resolvedTeams[slotKey] || MATCHES[phaseId][idx][side];
  const isResolved = displayName !== MATCHES[phaseId][idx][side];
  const isKnockout = KNOCKOUT_PHASE_IDS.includes(phaseId);
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState(displayName);

  if(!isKnockout){
    return React.createElement('div',{className:'qm-team '+align}, displayName);
  }

  if(!isAdmin){
    return React.createElement('div',{className:'qm-team '+align+(isResolved?' qm-team-overridden':'')}, displayName);
  }

  if(editing){
    const save = ()=>{
      const trimmed = draft.trim();
      if(trimmed) setTeamNames(prev=>({...prev, [slotKey]: trimmed}));
      setEditing(false);
    };
    return React.createElement('div',{className:'qm-team-edit', onClick:e=>e.stopPropagation()},
      React.createElement('input',{
        className:'qm-team-edit-input', value:draft, autoFocus:true,
        onChange:e=>setDraft(e.target.value),
        onKeyDown:e=>{ if(e.key==='Enter') save(); if(e.key==='Escape') setEditing(false); },
        onBlur:save
      })
    );
  }

  return React.createElement('div',{
    className:'qm-team '+align+' qm-team-editable'+(isResolved?' qm-team-overridden':''),
    onClick:(e)=>{ e.stopPropagation(); setDraft(displayName); setEditing(true); }
  },
    align==='left' ? null : React.createElement(Icon,{name:'edit', size:11, style:{marginRight:5, opacity:0.55, flexShrink:0}}),
    displayName,
    align==='left' ? React.createElement(Icon,{name:'edit', size:11, style:{marginLeft:5, opacity:0.55, flexShrink:0}}) : null
  );
}

function PenaltySelector({phaseId, idx, localName, visitName, penalties, setPenalties}){
  const k = phaseId+'_'+idx;
  const current = penalties[k];
  const choose = (side)=>{
    setPenalties(prev=>({...prev, [k]: side}));
  };
  return React.createElement('div',{
    style:{display:'flex', alignItems:'center', gap:10, padding:'10px 16px', borderRadius:10, background:'rgba(242,179,61,0.08)', border:'1px solid var(--amber-dim)', marginTop:8, marginBottom:4, fontSize:12.5},
    onClick:e=>e.stopPropagation()
  },
    React.createElement(Icon,{name:'trophy', size:15, style:{color:'var(--amber)', flexShrink:0}}),
    React.createElement('span',{style:{flexShrink:0}}, 'Empate — ¿quién avanzó por penales?'),
    React.createElement('button',{
      className:'qm-btn'+(current==='local'?' primary':''), style:{padding:'5px 11px', fontSize:12},
      onClick:()=>choose('local')
    }, localName),
    React.createElement('button',{
      className:'qm-btn'+(current==='visit'?' primary':''), style:{padding:'5px 11px', fontSize:12},
      onClick:()=>choose('visit')
    }, visitName)
  );
}

function PhaseView({phaseId, names, preds, reals, setPred, setReal, phasePoints, isAdmin, myPlayerIndex, locks, setLocks, resolvedTeams, teamNames, setTeamNames, penalties, setPenalties, avatars}){
  const matches = MATCHES[phaseId];
  const info = phasePoints[phaseId];
  const [expanded, setExpanded] = React.useState(null);
  const isLocked = !!locks[phaseId];
  const isKnockout = KNOCKOUT_PHASE_IDS.includes(phaseId);

  const toggleLock = ()=>{
    setLocks(prev=>({...prev, [phaseId]: !prev[phaseId]}));
  };

  return React.createElement('div',null,
    React.createElement('div',{className:'qm-phase-banner '+(info.complete?'done':'pending')},
      React.createElement(Icon,{name: info.complete?'trophy':'clock', size:21, style:{color: info.complete?'var(--amber)':'var(--bone-dim)'}}),
      React.createElement('div',{style:{flex:1}},
        React.createElement('div',{style:{fontSize:13.5, fontWeight:500}},
          info.complete ? 'Fase finalizada' : 'Fase en curso · faltan resultados reales'
        ),
        React.createElement('div',{style:{fontSize:12, color:'var(--bone-dim)', marginTop:2}},
          info.complete ? ('Ganador: '+info.winners.map(i=>names[i]).join(' y ')+' con '+info.max+' puntos') : 'El ganador se revela al completar todos los resultados reales de esta fase'
        )
      ),
      isAdmin && React.createElement('button',{
        className:'qm-btn'+(isLocked?'':' primary'), onClick:toggleLock,
        style:{flexShrink:0}
      },
        React.createElement(Icon,{name: isLocked?'lock':'lock-open', size:14}),
        isLocked ? 'Desbloquear pronósticos' : 'Bloquear pronósticos'
      )
    ),

    isLocked && React.createElement('div',{style:{display:'flex', alignItems:'center', gap:10, padding:'10px 16px', borderRadius:10, background:'rgba(212,112,138,0.1)', border:'1px solid var(--red)', marginBottom:14, fontSize:12.5, color:'var(--bone)'}},
      React.createElement(Icon,{name:'lock', size:16, style:{color:'var(--red)', flexShrink:0}}),
      'Los pronósticos de esta fase están bloqueados. '+(isAdmin?'Solo tú puedes desbloquearlos para permitir cambios.':'Solo el administrador puede desbloquearlos.')
    ),

    !isLocked && matches[0]?.ts && (()=>{
      const cd = calcCountdown(matches[0].ts);
      if(cd.estado==='urgent') return React.createElement('div',{className:'qm-closing-banner'},
        React.createElement(Icon,{name:'bell', size:16, style:{color:'var(--amber)', flexShrink:0}}),
        React.createElement('strong',null,'¡Cierre inminente! '),
        'El primer partido de esta fase arranca en ', React.createElement('strong',null, cd.texto),
        '. Asegúrate de guardar tus pronósticos.'
      );
      return null;
    })(),

    isAdmin && isKnockout && React.createElement('div',{style:{display:'flex', alignItems:'center', gap:8, fontSize:11.5, color:'var(--bone-dim)', marginBottom:12}},
      React.createElement(Icon,{name:'edit', size:13}),
      'Toca el nombre de cualquier equipo para escribir quién pasó realmente. Los partidos siguientes se actualizan solos cuando sea posible.'
    ),

    matches.map((m, idx)=>{
      const k = phaseId+'_'+idx;
      const real = reals[k] || {};
      const pset = preds[k] || {};
      const isOpen = expanded===idx;
      const localName = resolvedTeams[phaseId+'_'+idx+'_local'] || m.local;
      const visitName = resolvedTeams[phaseId+'_'+idx+'_visit'] || m.visit;
      const outcome = isKnockout ? getMatchOutcome(real, penalties[k]) : null;
      const showPenaltySelector = isAdmin && isKnockout && outcome && outcome.needsPenalty;
      return React.createElement('div',{key:idx, className:'qm-scoreboard'},
        React.createElement('div',{className:'qm-match-row', onClick:()=>setExpanded(isOpen?null:idx)},
          React.createElement('div',{className:'qm-match-grp'}, m.grp),
          React.createElement(TeamNameCell,{phaseId, idx, side:'local', resolvedTeams, teamNames, setTeamNames, isAdmin, align:'left'}),
          React.createElement('div',{className:'qm-score-box'},
            React.createElement('input',{className:'qm-realinput', type:'number', min:0, max:20,
              value: real.l!==undefined?real.l:'',
              disabled: !isAdmin,
              onClick:e=>e.stopPropagation(),
              onChange:e=>setReal(phaseId, idx, 'l', e.target.value)
            }),
            React.createElement('span',{className:'qm-dash'},'–'),
            React.createElement('input',{className:'qm-realinput', type:'number', min:0, max:20,
              value: real.v!==undefined?real.v:'',
              disabled: !isAdmin,
              onClick:e=>e.stopPropagation(),
              onChange:e=>setReal(phaseId, idx, 'v', e.target.value)
            })
          ),
          React.createElement(TeamNameCell,{phaseId, idx, side:'visit', resolvedTeams, teamNames, setTeamNames, isAdmin, align:'right'}),
          React.createElement('div',{className:'qm-fecha', style:{display:'flex', alignItems:'center', gap:4}},
            m.fecha,
            m.ts && React.createElement(CountdownTimer,{ts:m.ts})
          ),
          React.createElement('span',{className:'qm-chevron'+(isOpen?' open':'')}, React.createElement(Icon,{name:'chevron-down', size:14}))
        ),
        showPenaltySelector && React.createElement(PenaltySelector,{phaseId, idx, localName, visitName, penalties, setPenalties}),
        isOpen && React.createElement('div',{className:'qm-predpanel'},
          React.createElement('div',{className:'qm-predcard'},
            names.map((name,p)=>{
              const pr = pset[p] || {};
              const pts = calcPoints(pr, real);
              const isMine = p===myPlayerIndex;
              const canEditThisRow = isMine && !isLocked;
              return React.createElement('div',{key:p, className:'qm-predrow', style: isMine?{background:'rgba(242,179,61,0.06)'}:{}},
                React.createElement('div',{className:'qm-predrow-player'},
                  React.createElement(AvatarDisplay,{playerIdx:p, avatars, names, size:22}),
                  React.createElement('span',{style:{marginLeft:6}}),
                  name,
                  isMine && React.createElement('span',{style:{fontSize:10, color:'var(--amber)', marginLeft:6, textTransform:'uppercase', letterSpacing:'0.04em'}}, 'tú')
                ),
                React.createElement('div',{className:'qm-predrow-inputs'},
                  React.createElement('input',{className:'qm-predinput', type:'number', min:0, max:20,
                    value: pr.l!==undefined?pr.l:'',
                    disabled: !canEditThisRow,
                    onChange:e=>setPred(phaseId, idx, p, 'l', e.target.value)
                  }),
                  React.createElement('span',{className:'qm-dash', style:{fontSize:13}},'–'),
                  React.createElement('input',{className:'qm-predinput', type:'number', min:0, max:20,
                    value: pr.v!==undefined?pr.v:'',
                    disabled: !canEditThisRow,
                    onChange:e=>setPred(phaseId, idx, p, 'v', e.target.value)
                  }),
                  React.createElement('span',{className:'qm-pts-pill '+(pts===3?'p3':pts===1?'p1':pts===0?'p0':'pnone')},
                    pts==null? '—' : pts+' pt'+(pts===1?'':'s')
                  )
                )
              );
            })
          )
        )
      );
    })
  );
}

const root = ReactDOM.createRoot(document.getElementById('qm-root'));
root.render(React.createElement(App));

window.addEventListener('load', ()=>{
  setTimeout(()=>{
    document.getElementById('qm-veil').classList.add('hide');
  }, 250);
});

</script>
